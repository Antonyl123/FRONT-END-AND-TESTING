<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechLearn</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#222;
    color:white;
    padding:15px 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:20px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

.nav-links a:hover{
    color:#00bfff;
}


.hero{
    background-image:url("https://images.unsplash.com/photo-1498050108023-c5249f4df085");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    height:500px;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.hero-content{
    position:relative;
    z-index:1;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero-content h1{
    font-size:50px;
    margin-bottom:15px;
}

.hero-content p{
    font-size:22px;
    margin-bottom:20px;
}

.hero-content button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

.hero-content button:hover{
    background:#0056b3;
}


.features{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:40px;
}

.card{
    border:1px solid #ccc;
    padding:25px;
    text-align:center;
    border-radius:10px;
    transition:0.3s;
}

.card img{
    width:80px;
    height:80px;
    margin-bottom:10px;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 15px gray;
}

.card h2{
    margin-bottom:10px;
}


footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}


@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:10px;
    }

    .nav-links{
        flex-direction:column;
        text-align:center;
    }

    .features{
        grid-template-columns:1fr;
    }

    .hero-content h1{
        font-size:35px;
    }

    .hero-content p{
        font-size:18px;
    }
}
</style>
</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar">
    <div class="logo">TechLearn</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-content">
        <h1>Learn Web Development</h1>
        <p>Master HTML, CSS and JavaScript.</p>
        <button onclick="showMessage()">Get Started</button>
    </div>
</section>

<!-- Features Section -->
<section class="features">

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/732/732212.png" alt="HTML">
        <h2>HTML</h2>
        <p>Structure web pages using elements and tags.</p>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/732/732190.png" alt="CSS">
        <h2>CSS</h2>
        <p>Style and design responsive websites.</p>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" alt="JavaScript">
        <h2>JavaScript</h2>
        <p>Add interactivity and dynamic functionality.</p>
    </div>

</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 TechLearn</p>
</footer>

<!-- JavaScript -->
<script>
function showMessage(){
    alert("Welcome to TechLearn!");
}
</script>

</body>
</html>
