<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1e1e1e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    width:420px;
    background:#2d2d2d;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    font-size:28px;
    text-align:right;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    background:#dfffd6;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
}

button{
    height:55px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.num{
    background:#444;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.func{
    background:#3498db;
    color:white;
}

.equal{
    background:#2ecc71;
    color:white;
}

.clear{
    background:#e74c3c;
    color:white;
}
</style>
</head>
<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="func" onclick="append('(')">(</button>
        <button class="func" onclick="append(')')">)</button>
        <button class="func" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="func" onclick="append('Math.sin(')">sin</button>
        <button class="func" onclick="append('Math.cos(')">cos</button>
        <button class="func" onclick="append('Math.tan(')">tan</button>
        <button class="func" onclick="append('Math.log10(')">log</button>
        <button class="func" onclick="append('Math.log(')">ln</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="func" onclick="append('Math.sqrt(')">√</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>
        <button class="func" onclick="append('**')">xʸ</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>
        <button class="func" onclick="append('Math.PI')">π</button>

        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="func" onclick="backspace()">⌫</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="func" onclick="append('Math.E')">e</button>

    </div>

</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try {
        display.value = eval(display.value);
    } catch (error) {
        display.value = "Error";
    }
}
</script>

</body>
</html>
